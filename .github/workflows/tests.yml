name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-3d:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r droplet_coalescence_3d/requirements.txt

      - name: Run 3D tests
        working-directory: droplet_coalescence_3d
        run: python -m pytest test_core_3d.py -q
